apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-demo
  template:
    metadata:
      labels:
        app: k8s-demo
    spec:
      containers:
        - name: vite-app
          image: mallubeast/k8s-demo:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-demo-service
spec:
  type: LoadBalancer
  selector:
    app: k8s-demo
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 80
